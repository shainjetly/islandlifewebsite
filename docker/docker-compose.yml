services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    expose:
      - "6008"
    networks:
      - default
      - coolify
    labels:
      - "coolify.managed=true"
      - "coolify.service=web"
      - "caddy=islandlife.koaders.com"
      - "caddy.reverse_proxy={{upstreams 6008}}"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: 1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:6008"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  coolify:
    external: true
